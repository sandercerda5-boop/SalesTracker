<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sari-Sari Store Tracker</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; }
    h1 { color: #2c3e50; }
    input, select, button { padding: 10px; margin: 5px; }
    #summary { display: flex; gap: 40px; margin-bottom: 20px; }
    #summary div { background: #f4f4f4; padding: 10px; border-radius: 5px; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
    th { background-color: #eaeaea; }
    .actions { margin-top: 20px; }
    .actions button { margin-right: 10px; }
    .btn-small { padding: 5px 8px; margin: 2px; }
  </style>
</head>
<body>
  <h1>Sari-Sari Store Tracker</h1>

  <!-- Input section -->
  <input type="number" id="amount" placeholder="Enter amount (₱)" />
  <select id="category">
    <option value="Sales">Sales</option>
    <option value="GCash-In">GCash Cash-In</option>
    <option value="GCash-Out">GCash Cash-Out</option>
    <option value="Print">Print</option>
    <option value="BDO">BDO Cash Agad</option>
    <option value="E-Load">E-Load</option>
  </select>
  <button onclick="addTransaction()">Add Transaction</button>

  <!-- Summary section -->
  <h2>Totals</h2>
  <div id="summary">
    <div><strong>Sales:</strong> ₱<span id="salesTotal">0</span></div>
    <div><strong>GCash-In:</strong> ₱<span id="gcashInTotal">0</span></div>
    <div><strong>GCash-Out:</strong> ₱<span id="gcashOutTotal">0</span></div>
    <div><strong>Print:</strong> ₱<span id="printTotal">0</span></div>
    <div><strong>BDO:</strong> ₱<span id="bdoTotal">0</span></div>
    <div><strong>E-Load:</strong> ₱<span id="eloadTotal">0</span></div>
  </div>

  <!-- Transaction history -->
  <h2>Transaction History</h2>
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Amount (₱)</th>
        <th>Category</th>
        <th>Date</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="transactionList"></tbody>
  </table>

  <!-- Action buttons -->
  <div class="actions">
    <button onclick="resetData()">Reset</button>
    <button onclick="saveData()">Save Locally</button>
    <button onclick="loadData()">Load Saved Data</button>
    <button onclick="exportCSV()">Export to CSV</button>
  </div>

  <!-- JavaScript -->
  <script>
    let transactions = [];
    let editIndex = null; // Track which transaction is being edited

    function addTransaction() {
      const amountInput = document.getElementById("amount");
      const categoryInput = document.getElementById("category");
      const amount = parseFloat(amountInput.value);
      const category = categoryInput.value;

      if (!isNaN(amount) && amount > 0) {
        const date = new Date();

        if (editIndex !== null) {
          // Update existing transaction
          transactions[editIndex].amount = amount;
          transactions[editIndex].category = category;
          transactions[editIndex].date = date;
          editIndex = null;
        } else {
          // Add new transaction
          transactions.push({ amount: amount, category: category, date: date });
        }

        updateDisplay();
        amountInput.value = "";
      } else {
        alert("Please enter a valid amount.");
      }
    }

    function updateDisplay() {
      // Totals per category
      const salesTotal = transactions.filter(t => t.category==="Sales")
        .reduce((sum,t)=>sum+t.amount,0);
      const gcashInTotal = transactions.filter(t => t.category==="GCash-In")
        .reduce((sum,t)=>sum+t.amount,0);
      const gcashOutTotal = transactions.filter(t => t.category==="GCash-Out")
        .reduce((sum,t)=>sum+t.amount,0);
      const printTotal = transactions.filter(t => t.category==="Print")
        .reduce((sum,t)=>sum+t.amount,0);
      const bdoTotal = transactions.filter(t => t.category==="BDO")
        .reduce((sum,t)=>sum+t.amount,0);
      const eloadTotal = transactions.filter(t => t.category==="E-Load")
        .reduce((sum,t)=>sum+t.amount,0);

      // Update summary section
      document.getElementById("salesTotal").textContent = salesTotal.toFixed(2);
      document.getElementById("gcashInTotal").textContent = gcashInTotal.toFixed(2);
      document.getElementById("gcashOutTotal").textContent = gcashOutTotal.toFixed(2);
      document.getElementById("printTotal").textContent = printTotal.toFixed(2);
      document.getElementById("bdoTotal").textContent = bdoTotal.toFixed(2);
      document.getElementById("eloadTotal").textContent = eloadTotal.toFixed(2);

      // Update transaction table (recent first)
      const list = document.getElementById("transactionList");
      list.innerHTML = "";
      transactions.slice().reverse().forEach((t, i) => {
        const actualIndex = transactions.length - 1 - i;
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${transactions.length - i}</td>
          <td>₱${t.amount.toFixed(2)}</td>
          <td>${t.category}</td>
          <td>${t.date.toLocaleString()}</td>
          <td>
            <button class="btn-small" onclick="editTransaction(${actualIndex})">Edit</button>
            <button class="btn-small" onclick="deleteTransaction(${actualIndex})">Delete</button>
          </td>`;
        list.appendChild(row);
      });
    }

    function editTransaction(index) {
      const t = transactions[index];
      document.getElementById("amount").value = t.amount;
      document.getElementById("category").value = t.category;
      editIndex = index;
    }

    function deleteTransaction(index) {
      if (confirm("Delete this transaction?")) {
        transactions.splice(index, 1);
        updateDisplay();
      }
    }

    // Reset all data
    function resetData() {
      if (confirm("Are you sure you want to reset all data?")) {
        transactions = [];
        updateDisplay();
        localStorage.removeItem("storeData");
      }
    }

    // Save data locally
    function saveData() {
      localStorage.setItem("storeData", JSON.stringify(transactions));
      alert("Data saved locally!");
    }

    // Load saved data
    function loadData() {
      const saved = localStorage.getItem("storeData");
      if (saved) {
        transactions = JSON.parse(saved);
        updateDisplay();
        alert("Data loaded!");
      } else {
        alert("No saved data found.");
      }
    }

    // Export to CSV
    function exportCSV() {
      let csv = "No,Amount,Category,Date\n";
      transactions.forEach((t, i) => {
        csv += `${i+1},${t.amount},${t.category},${t.date}\n`;
      });
      const blob = new Blob([csv], { type: "text/csv" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "transactions.csv";
      a.click();
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
